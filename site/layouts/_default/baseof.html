<!doctype html>
<html lang="{{ .Site.Language.Locale }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ with resources.Get "css/main.css" }}
      {{ $css := . | minify | fingerprint }}
      <link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">
    {{ end }}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ .Site.Home.RelPermalink }}">PyPI Transparency</a>
      <nav aria-label="Main navigation">
        <a href="{{ .Site.Params.pepURL }}">Draft PEP</a>
        <a href="{{ .Site.Params.repoURL }}">GitHub</a>
      </nav>
    </header>

    {{ block "main" . }}{{ end }}

    <footer class="site-footer">
      <p>Draft proposal for auditable package distribution on Python package indexes.</p>
    </footer>
  </body>
</html>
